<!doctype html><html lang="fa" dir="rtl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>SHIL Assets Preview</title><style>body{margin:0;font-family:system-ui;background:#07111f;color:#f8e9b0;padding:24px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:12px;text-align:center}.card img{width:100%;height:96px;object-fit:contain}.path{direction:ltr;font-size:10px;word-break:break-all;color:#cbd5e1}</style></head><body><h1>SHIL Active Assets Preview</h1><div id="grid" class="grid"></div><script>const assets=["/assets/shil/background/login/shil-login-bg.webp","/assets/shil/background/main/shil-main-bg.webp","/assets/shil/logo/welcome/shil-welcome-logo.webp","/assets/shil/contact/shil-products-banner.webp","/assets/shil/map/iran-heatmap.webp","/assets/shil/icon/dashboard/new-project.png","/assets/shil/icon/dashboard/projects.png","/assets/shil/icon/dashboard/contact.png","/assets/shil/icon/dashboard/assistant.png","/assets/shil/icon/dashboard/feedback.png","/assets/shil/icon/dashboard/scenarios.png","/assets/shil/icon/dashboard/education.png","/assets/shil/icon/project/project-info.png","/assets/shil/icon/project/environment.png","/assets/shil/icon/project/project-path.png","/assets/shil/icon/project/method.png","/assets/shil/icon/project/inputs.png","/assets/shil/icon/project/system.png","/assets/shil/icon/project/summary.png","/assets/shil/icon/project/run.png","/assets/shil/icon/project/output.png","/assets/shil/icon/project/future.png"];document.getElementById('grid').innerHTML=assets.map(src=>`<div class="card"><img src="${src}"/><div class="path">${src}</div></div>`).join('');</script></body></html>
